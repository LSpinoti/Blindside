services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      VITE_DEV_PROXY_TARGET: http://api:3001
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      PORT: 3001
      MONAD_RPC_URL: https://testnet-rpc.monad.xyz
      BLINDSIDE_PYTH_BETA_ADDRESS: 0xad2B52D2af1a9bD5c561894Cdd84f7505e1CD0B5
      BLINDSIDE_PYTH_HERMES_URL: https://hermes-beta.pyth.network
      BLINDSIDE_PYTH_MON_USD_FEED_ID: e786153cc54abd4b0e53b4c246d54d9f8eb3f3b5a34d4fc5a2e9a423b0ba5d6b
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: blindside
      POSTGRES_USER: blindside
      POSTGRES_PASSWORD: blindside
    ports:
      - "5432:5432"
    volumes:
      - blindside_db_data:/var/lib/postgresql/data

volumes:
  frontend_node_modules:
  api_node_modules:
  blindside_db_data:
